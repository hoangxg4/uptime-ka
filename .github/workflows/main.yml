name: Keep Alive

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Fast Wake Up
        env:
          DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          CURRENT_INDEX: ${{ matrix.index }}
          GH_TOKEN: "${{ secrets.GH_PAT }}"
          RAW_CONFIG_URL: "${{ secrets.RAW_CONFIG_URL }}"
        run: |
          # 1. Tải danh sách cấu hình bảo mật
          RAW_LIST=$(curl -s -H "Authorization: token $GH_TOKEN" "$RAW_CONFIG_URL")
          
          if [ -z "$RAW_LIST" ] || [[ "$RAW_LIST" == *"Not Found"* || "$RAW_LIST" == *"Bad credentials"* ]]; then
            echo "❌ Không thể tải file cấu hình từ Secret!"
            exit 1
          fi

          # 2. Xử lý khoảng trắng và dòng trống
          CLEAN_LIST=$(echo "$RAW_LIST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          TOTAL=${#ALL_URLS[@]}
          
          # 3. Vòng lặp chia tải Matrix 5
          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            line="${ALL_URLS[$i]}"
            
            # Tách lấy URL
            url=$(echo "$line" | cut -d'|' -f1 | sed 's/[[:space:]]*$//')
            echo "🚀 Đang đánh thức: $url"
            
            # Gom các header đi kèm sau dấu "|"
            HEADER_PARAMS=""
            num_pipes=$(grep -o "|" <<< "$line" | wc -l)
            
            if [ "$num_pipes" -gt 0 ]; then
              for (( j=2; j<=num_pipes+1; j++ )); do
                single_header=$(echo "$line" | cut -d'|' -f$j | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                if [ -n "$single_header" ]; then
                  HEADER_PARAMS="$HEADER_PARAMS --header \"$single_header\""
                fi
              done
            fi
            
            # 4. Gọi trình duyệt mở Web để kích hoạt Keep Alive
            RESULT=$(eval "agent-browser open \"$url\" $HEADER_PARAMS --timeout 25000 2>&1") || true
            
            # 5. Bộ lọc lỗi tối giản dành riêng cho Keep Alive (Chấp nhận cả mã lỗi 404)
            # Nếu kết quả chứa lỗi Code (như 404) -> Chấp nhận vì server có phản hồi.
            if [[ "$RESULT" == *"ERR_HTTP_RESPONSE_CODE_FAILURE"* ]]; then
              echo "✅ $url Phản hồi mã lỗi chủ đích (Ví dụ: 404 Not Found hoặc 401/403). Server vẫn SỐNG và đã được đánh thức!"
            elif [[ "$RESULT" == *"ERR_"* || "$RESULT" == *"Timeout"* || "$RESULT" == *"status: 5"* ]]; then
              echo "❌ $url THỰC SỰ SẬP! Chi tiết: $RESULT"
              
              SHORT_ERR=$(echo "$RESULT" | head -n 2 | cut -c1-100)
              
              # Gửi cảnh báo về Discord
              MSG="{\"embeds\":[{\"title\":\"🚨 CẢNH BÁO: WEB SẬP HOÀN TOÀN\",\"color\":15158528,\"description\":\"**URL:** $url\n**Lỗi:** $SHORT_ERR\",\"footer\":{\"text\":\"$(date '+%H:%M:%S %d/%m/%Y')\"}}]}"
              curl -s -H "Content-Type: application/json" -X POST -d "$MSG" "$DISCORD_WEBHOOK"
            else
              echo "✅ $url Đã được đánh thức thành công (Hoặc đang Online)."
            fi
            
            agent-browser close || true
          done

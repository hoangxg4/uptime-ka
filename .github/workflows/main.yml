name: Pro Keep Alive (Auto-Parallel)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      # Chúng ta tạo 5 matrix cố định từ 0 đến 4
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Process My Group
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RAW_LIST: ${{ vars.WEBSITES_LIST }}
          CURRENT_INDEX: ${{ matrix.index }}
        run: |
          # 1. Làm sạch danh sách và đưa vào mảng
          CLEAN_LIST=$(echo "$RAW_LIST" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          
          TOTAL=${#ALL_URLS[@]}
          echo "Tổng số website: $TOTAL"

          # 2. Thuật toán chia: Mỗi matrix chỉ xử lý các phần tử có (vị trí % 5 == CURRENT_INDEX)
          # Cách này giúp chia đều web cho 5 luồng mà không cần tạo file tạm
          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            url="${ALL_URLS[$i]}"
            
            # Random sleep 10-120s cho mỗi web
            SLEEP_TIME=$(( RANDOM % 111 + 10 ))
            echo "--- Matrix $CURRENT_INDEX: Đợi $SLEEP_TIME giây cho $url ---"
            sleep $SLEEP_TIME
            
            echo "🚀 Đang đánh thức: $url"
            
            if ! agent-browser open "$url" --timeout 30000; then
              echo "❌ $url sập!"
              
              JSON_PAYLOAD=$(cat <<EOF
              {
                "embeds": [{
                  "title": "🚨 CẢNH BÁO WEBSITE DOWN",
                  "color": 15158528,
                  "fields": [
                    {"name": "Địa chỉ", "value": "$url", "inline": false},
                    {"name": "Trạng thái", "value": "Không phản hồi (Timeout)", "inline": true},
                    {"name": "Thời gian", "value": "$(date '+%H:%M:%S %d/%m/%Y') UTC", "inline": true}
                  ],
                  "footer": {"text": "Matrix: $CURRENT_INDEX | GitHub Actions Monitor"}
                }]
              }
          EOF
              )
              curl -H "Content-Type: application/json" -X POST -d "$JSON_PAYLOAD" "$DISCORD_WEBHOOK"
            else
              echo "✅ $url Online."
            fi
            agent-browser close || true
          done

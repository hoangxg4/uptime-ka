name: Keep Alive

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      # Bước 1: Tải Obscura Binary trực tiếp từ GitHub Releases (~2 giây)
      - name: Install Obscura Browser
        run: |
          curl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-linux.tar.gz
          tar xzf obscura-x86_64-linux.tar.gz
          chmod +x obscura
          sudo mv obscura /usr/local/bin/
          echo "✅ Đã cài đặt Obscura Browser thành công!"

      # Bước 2: Chạy vòng lặp gọi Obscura thông qua CLI/HTTP mượt mà
      - name: Fast Wake Up
        env:
          DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          CURRENT_INDEX: ${{ matrix.index }}
          GH_TOKEN: "${{ secrets.GH_PAT }}"
          RAW_CONFIG_URL: "${{ secrets.RAW_CONFIG_URL }}"
        run: |
          # 1. Tải danh sách cấu hình bảo mật từ RAW URL
          RAW_LIST=$(curl -s -H "Authorization: token $GH_TOKEN" "$RAW_CONFIG_URL")
          
          if [ -z "$RAW_LIST" ] || [[ "$RAW_LIST" == *"Not Found"* || "$RAW_LIST" == *"Bad credentials"* ]]; then
            echo "❌ Không thể tải file cấu hình từ Secret!"
            exit 1
          fi

          # 2. Xử lý khoảng trắng và dòng trống
          CLEAN_LIST=$(echo "$RAW_LIST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          TOTAL=${#ALL_URLS[@]}
          
          # 3. Vòng lặp chia tải Matrix 5
          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            line="${ALL_URLS[$i]}"
            
            # Tách lấy URL
            url=$(echo "$line" | cut -d'|' -f1 | sed 's/[[:space:]]*$//')
            echo "--------------------------------------------------------"
            echo "🚀 Đang tiến hành gọi Obscura nạp trang: $url"
            
            # Tách lấy chuỗi Header chứa Token (nếu có)
            token_val=""
            if [[ "$line" == *"|"* ]]; then
              token_val=$(echo "$line" | cut -d'|' -f2- | sed 's/Authorization://g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            fi

            # 4. Kích hoạt Obscura cho từng URL đơn lẻ để tránh xung đột Session CDP
            # Sử dụng cờ --header trực tiếp từ CLI của Obscura (nếu có token) giúp loại bỏ hoàn toàn script JS lằng nhằng
            if [ -n "$token_val" ]; then
              echo "[Obscura] Đang ghim Token Authorization kèm theo Request..."
              RESULT=$(obscura --stealth --header "Authorization: $token_val" --timeout 15 screenshot --url "$url" /dev/null 2>&1) || true
            else
              RESULT=$(obscura --stealth --timeout 15 screenshot --url "$url" /dev/null 2>&1) || true
            fi
            
            echo "=== [OBSCURA BROWSER LOGS] ==="
            echo "$RESULT"
            echo "============================="
            
            # 5. Kiểm tra lỗi dựa vào phản hồi log hệ thống của Obscura
            if [[ "$RESULT" == *"error"* || "$RESULT" == *"failed"* || "$RESULT" == *"Unauthorized"* ]]; then
              echo "❌ $url Gặp sự cố tải trang hoặc Token không hợp lệ!"
              
              SHORT_ERR=$(echo "$RESULT" | head -n 2 | cut -c1-100)
              MSG="{\"embeds\":[{\"title\":\"🚨 CẢNH BÁO: KEEPALIVE THẤT BẠI\",\"color\":15158528,\"description\":\"**URL:** $url\n**Lỗi:** $SHORT_ERR\",\"footer\":{\"text\":\"$(date '+%H:%M:%S %d/%m/%Y')\"}}]}"
              curl -s -H "Content-Type: application/json" -X POST -d "$MSG" "$DISCORD_WEBHOOK"
            else
              echo "✅ $url Đã kích hoạt ứng dụng thành công."
            fi
          done

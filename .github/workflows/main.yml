name: Keep Alive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [up_keep]

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Fast Wake Up
        env:
          DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          RAW_LIST: "${{ vars.WEBSITES_LIST }}"
          CURRENT_INDEX: ${{ matrix.index }}
        run: |
          # 1. Chuyển danh sách thành mảng
          CLEAN_LIST=$(echo "$RAW_LIST" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          TOTAL=${#ALL_URLS[@]}
          
          # 2. Chạy thẳng luôn, không đợi chờ
          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            url="${ALL_URLS[$i]}"
            echo "🚀 Đang đánh thức: $url"
            
            # Mở web, nếu lỗi thì bắt kết quả
            RESULT=$(agent-browser open "$url" --timeout 25000 2>&1) || true
            
            if [[ "$RESULT" == *"ERR_NAME_NOT_RESOLVED"* || "$RESULT" == *"ERR_CONNECTION_REFUSED"* || "$RESULT" == *"Timeout"* ]]; then
              echo "❌ $url sập!"
              
              # Gửi Discord gọn trong 1 dòng để không bao giờ lỗi YAML
              MSG="{\"embeds\":[{\"title\":\"🚨 CẢNH BÁO DOWN\",\"color\":15158528,\"description\":\"**URL:** $url\n**Matrix:** $CURRENT_INDEX\",\"footer\":{\"text\":\"$(date '+%H:%M:%S %d/%m/%Y')\"}}]}"
              curl -s -H "Content-Type: application/json" -X POST -d "$MSG" "$DISCORD_WEBHOOK"
            else
              echo "✅ $url Online."
            fi
            
            agent-browser close || true
          done

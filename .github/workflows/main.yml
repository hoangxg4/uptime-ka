name: Keep Alive

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      # Bước 1: Setup Bun thần tốc
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Bước 2: Dùng Bun cài đặt agent-browser siêu nhanh
      - name: Install agent-browser
        run: |
          bun install -g agent-browser
          # Giữ nguyên lệnh cài đặt các dependency của trình duyệt ngầm (Puppeteer/Playwright nếu có)
          agent-browser install --with-deps

      - name: Fast Wake Up
        env:
          DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          CURRENT_INDEX: ${{ matrix.index }}
          GH_TOKEN: "${{ secrets.GH_PAT }}"
          RAW_CONFIG_URL: "${{ secrets.RAW_CONFIG_URL }}"
        run: |
          # 1. Tải danh sách cấu hình bảo mật (Giữ curl bình thường hiển thị tiến trình log)
          RAW_LIST=$(curl -H "Authorization: token $GH_TOKEN" "$RAW_CONFIG_URL")
          
          if [ -z "$RAW_LIST" ] || [[ "$RAW_LIST" == *"Not Found"* || "$RAW_LIST" == *"Bad credentials"* ]]; then
            echo "❌ Không thể tải file cấu hình từ Secret!"
            exit 1
          fi

          # 2. Xử lý khoảng trắng và dòng trống
          CLEAN_LIST=$(echo "$RAW_LIST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          TOTAL=${#ALL_URLS[@]}
          
          # 3. Vòng lặp chia tải Matrix 5
          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            line="${ALL_URLS[$i]}"
            
            # Tách lấy URL
            url=$(echo "$line" | cut -d'|' -f1 | sed 's/[[:space:]]*$//')
            echo "--------------------------------------------------------"
            echo "🚀 Đang đánh thức và render toàn bộ trang: $url"
            
            # SỬA LỖI HEADER: Dùng mảng Bash thay vì chuỗi thuần để tránh lỗi Nuốt Dấu của eval
            HEADER_PARAMS=()
            num_pipes=$(grep -o "|" <<< "$line" | wc -l)
            
            if [ "$num_pipes" -gt 0 ]; then
              for (( j=2; j<=num_pipes+1; j++ )); do
                single_header=$(echo "$line" | cut -d'|' -f$j | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                if [ -n "$single_header" ]; then
                  # Thêm từng cặp tham số trực tiếp vào mảng
                  HEADER_PARAMS+=("--header" "$single_header")
                fi
              done
            fi
            
            # 4. Gọi trình duyệt mở Web (Không dùng eval nữa để bảo toàn cấu trúc mảng Header)
            RESULT=$(agent-browser open "$url" "${HEADER_PARAMS[@]}" --timeout 60000 --wait-until networkidle --screenshot 2>&1) || true
            
            # In FULL LOG của agent-browser ra GitHub Actions Console
            echo "=== [AGENT-BROWSER LOGS] ==="
            echo "$RESULT"
            echo "============================="
            
            # 5. Bộ lọc lỗi
            if [[ "$RESULT" == *"ERR_HTTP_RESPONSE_CODE_FAILURE"* ]]; then
              echo "✅ $url Phản hồi mã lỗi chủ đích. Server vẫn hoạt động!"
            elif [[ "$RESULT" == *"ERR_"* || "$RESULT" == *"Timeout"* || "$RESULT" == *"status: 5"* ]]; then
              echo "❌ $url Gặp sự cố kết nối!"
              
              SHORT_ERR=$(echo "$RESULT" | head -n 2 | cut -c1-100)
              
              MSG="{\"embeds\":[{\"title\":\"🚨 CẢNH BÁO: WEB SẬP HOÀN TOÀN\",\"color\":15158528,\"description\":\"**URL:** $url\n**Lỗi:** $SHORT_ERR\",\"footer\":{\"text\":\"$(date '+%H:%M:%S %d/%m/%Y')\"}}]}"
              curl -s -H "Content-Type: application/json" -X POST -d "$MSG" "$DISCORD_WEBHOOK"
            else
              echo "✅ $url Đã tải và xử lý giao diện thành công."
            fi
            
            agent-browser close || true
          done

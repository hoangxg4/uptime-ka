name: Pro Keep Alive (Auto-Parallel)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Process My Group
        env:
          # Sử dụng quotes để đảm bảo không bị lỗi ký tự đặc biệt
          DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          RAW_LIST: "${{ vars.WEBSITES_LIST }}"
          CURRENT_INDEX: ${{ matrix.index }}
        run: |
          # 1. Làm sạch danh sách
          CLEAN_LIST=$(echo "$RAW_LIST" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          
          TOTAL=${#ALL_URLS[@]}
          
          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            url="${ALL_URLS[$i]}"
            
            SLEEP_TIME=$(( RANDOM % 111 + 10 ))
            echo "--- Matrix $CURRENT_INDEX: Đợi $SLEEP_TIME giây cho $url ---"
            sleep $SLEEP_TIME
            
            echo "🚀 Đang đánh thức: $url"
            
            # CHỈNH SỬA: Thêm || true để không làm dừng script khi agent-browser báo lỗi (như 404)
            # Chúng ta sẽ kiểm tra thủ công kết quả
            RESULT=$(agent-browser open "$url" --timeout 30000 2>&1) || true
            echo "$RESULT"

            # CHỈNH SỬA LOGIC KIỂM TRA:
            # Nếu gặp lỗi HTTP (như 404) nhưng vẫn kết nối được thì coi như vẫn sống (Keep-alive thành công)
            # Chỉ báo sập nếu là lỗi DNS, Timeout nặng hoặc từ chối kết nối hoàn toàn.
            if [[ "$RESULT" == *"ERR_NAME_NOT_RESOLVED"* || "$RESULT" == *"ERR_CONNECTION_REFUSED"* || "$RESULT" == *"Timeout"* ]]; then
              echo "❌ $url sập thật sự!"
              
              # Gửi Discord dùng định dạng an toàn hơn để tránh lỗi 'Malformed input'
              curl -H "Content-Type: application/json" \
                   -X POST \
                   -d @- "$DISCORD_WEBHOOK" <<EOF
              {
                "embeds": [{
                  "title": "🚨 CẢNH BÁO WEBSITE DOWN",
                  "color": 15158528,
                  "fields": [
                    {"name": "Địa chỉ", "value": "$url", "inline": false},
                    {"name": "Lỗi", "value": "Không thể truy cập hệ thống", "inline": true},
                    {"name": "Thời gian", "value": "$(date '+%H:%M:%S %d/%m/%Y') UTC", "inline": true}
                  ],
                  "footer": {"text": "Matrix: $CURRENT_INDEX"}
                }]
              }
EOF
            else
              echo "✅ $url Online (Hoặc trả về mã lỗi có chủ đích)."
            fi
            
            agent-browser close || true
          done

name: Keep Alive

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      - name: Install Obscura Browser
        run: |
          curl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-linux.tar.gz
          tar xzf obscura-x86_64-linux.tar.gz
          chmod +x obscura
          sudo mv obscura /usr/local/bin/
          echo "✅ Đã cài đặt Obscura Browser thành công!"

      - name: Create Python Engine File
        run: |
          # Sử dụng cơ chế echo -e với định dạng \n và \t rõ ràng để bảo vệ cấu trúc Python 100%
          echo -e 'import sys\nimport json\nimport urllib.request\nimport time\n\ndef call_cdp(url, token_val):\n\ttry:\n\t\twith urllib.request.urlopen("http://127.0.0.1:9222/json") as response:\n\t\t\ttabs = json.loads(response.read().decode())\n\t\tif not tabs:\n\t\t\tprint("❌ Không tìm thấy tab hoạt động nào trên Obscura!")\n\t\t\treturn False\n\t\trpc_url = "http://127.0.0.1:9222/json/rpc"\n\t\treq_net = urllib.request.Request(rpc_url, data=json.dumps({"id": 1, "method": "Network.enable", "params": {}}).encode(), headers={"Content-Type": "application/json"})\n\t\turllib.request.urlopen(req_net)\n\t\tif token_val:\n\t\t\theaders_payload = {"headers": {"Authorization": token_val}}\n\t\t\treq_header = urllib.request.Request(rpc_url, data=json.dumps({"id": 2, "method": "Network.setExtraHTTPHeaders", "params": headers_payload}).encode(), headers={"Content-Type": "application/json"})\n\t\t\turllib.request.urlopen(req_header)\n\t\t\tprint("[Python] Đã gài Header Authorization vào Session.")\n\t\tnavigate_payload = {"url": url}\n\t\treq_nav = urllib.request.Request(rpc_url, data=json.dumps({"id": 3, "method": "Page.navigate", "params": navigate_payload}).encode(), headers={"Content-Type": "application/json"})\n\t\twith urllib.request.urlopen(req_nav) as res:\n\t\t\tres_data = json.loads(res.read().decode())\n\t\t\tif "error" in res_data:\n\t\t\t\tprint(f"❌ Lỗi từ Obscura: {res_data[\"error\"]}")\n\t\t\t\treturn False\n\t\ttime.sleep(8)\n\t\tprint(f"✅ Đã ping thành công tới {url}")\n\t\treturn True\n\texcept Exception as e:\n\t\tprint(f"❌ Lỗi kết nối đến Obscura Server: {str(e)}")\n\t\treturn False\n\nif __name__ == "__main__":\n\ttarget_url = sys.argv[1]\n\ttoken = sys.argv[2] if len(sys.argv) > 2 else ""\n\tsuccess = call_cdp(target_url, token)\n\tsys.exit(0 if success else 1)' > run_keepalive.py
          echo "✅ Đã khởi tạo file Python Engine thành công!"

      - name: Fast Wake Up
        env:
          DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          CURRENT_INDEX: ${{ matrix.index }}
          GH_TOKEN: "${{ secrets.GH_PAT }}"
          RAW_CONFIG_URL: "${{ secrets.RAW_CONFIG_URL }}"
        run: |
          RAW_LIST=$(curl -s -H "Authorization: token $GH_TOKEN" "$RAW_CONFIG_URL")
          
          if [ -z "$RAW_LIST" ] || [[ "$RAW_LIST" == *"Not Found"* || "$RAW_LIST" == *"Bad credentials"* ]]; then
            echo "❌ Không thể tải file cấu hình từ Secret!"
            exit 1
          fi

          CLEAN_LIST=$(echo "$RAW_LIST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          TOTAL=${#ALL_URLS[@]}
          
          obscura serve --port 9222 --stealth > obscura_server.log 2>&1 &
          sleep 2

          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            line="${ALL_URLS[$i]}"
            url=$(echo "$line" | cut -d'|' -f1 | sed 's/[[:space:]]*$//')
            echo "--------------------------------------------------------"
            
            token_val=""
            if [[ "$line" == *"|"* ]]; then
              token_val=$(echo "$line" | cut -d'|' -f2- | sed 's/Authorization://g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            fi

            set +e
            RESULT=$(python3 run_keepalive.py "$url" "$token_val" 2>&1)
            EXIT_CODE=$?
            set -e
            
            echo "=== [EXECUTION LOGS] ==="
            echo "$RESULT"
            echo "========================"
            
            if [ $EXIT_CODE -ne 0 ] || [[ "$RESULT" == *"❌"* ]]; then
              echo "❌ $url Gặp sự cố!"
              
              SHORT_ERR=$(echo "$RESULT" | head -n 3 | tr -d '\n' | tr -d '"' | cut -c1-150)
              MSG="{\"embeds\":[{\"title\":\"🚨 CẢNH BÁO: KEEPALIVE THẤT BẠI\",\"color\":15158528,\"description\":\"**URL:** $url\n**Lỗi:** $SHORT_ERR\",\"footer\":{\"text\":\"$(date '+%H:%M:%S %d/%m/%Y')\"}}]}"
              curl -s -H "Content-Type: application/json" -X POST -d "$MSG" "$DISCORD_WEBHOOK"
            else
              echo "✅ $url Hoàn tất chu kỳ kích hoạt."
            fi
          done

          rm -f run_keepalive.py
          pkill -f obscura || true

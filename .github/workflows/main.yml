name: Pro Keep Alive (Auto-Parallel)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix_config: ${{ steps.split.outputs.matrix }}
    steps:
      - id: split
        run: |
          # 1. Lấy danh sách từ Variable và làm sạch dữ liệu
          RAW_LIST="${{ vars.WEBSITES_LIST }}"
          CLEAN_LIST=$(echo $RAW_LIST | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          
          # 2. Đưa vào file tạm
          echo "$CLEAN_LIST" > urls.txt
          TOTAL=$(wc -l < urls.txt)
          echo "Tổng số website: $TOTAL"

          # 3. Chia thành 5 nhóm (file)
          split -n l/5 -d urls.txt group_ --additional-suffix=.txt || true

          # 4. Gom các nhóm thành mảng JSON cho Matrix
          # Nếu ít hơn 5 web, split sẽ tạo ít file hơn, jq vẫn xử lý tốt.
          JSON_MATRIX=$(printf '%s\n' group_*.txt | jq -R . | jq -s -c .)
          echo "matrix=$JSON_MATRIX" >> $GITHUB_OUTPUT

  ping:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        group_file: ${{ fromJson(needs.prepare.outputs.matrix_config) }}
      fail-fast: false
      max-parallel: 5
    
    steps:
      - uses: actions/checkout@v4 # Cần để đọc các file group_*.txt được tạo

      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install --with-deps

      - name: Process Group
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Đọc các URL từ file nhóm được phân bổ
          while IFS= read -r url; do
            # Random sleep 10-120s cho mỗi web để "tàng hình"
            SLEEP_TIME=$(( RANDOM % 111 + 10 ))
            echo "--- Đợi $SLEEP_TIME giây cho $url ---"
            sleep $SLEEP_TIME
            
            echo "🚀 Đang đánh thức: $url"
            
            if ! agent-browser open "$url" --timeout 30000; then
              echo "❌ $url sập!"
              
              # Thông báo Discord xịn xò hơn
              JSON_PAYLOAD=$(cat <<EOF
              {
                "embeds": [{
                  "title": "🚨 CẢNH BÁO WEBSITE DOWN",
                  "color": 15158528,
                  "fields": [
                    {"name": "Địa chỉ", "value": "$url", "inline": false},
                    {"name": "Trạng thái", "value": "Không phản hồi (Timeout)", "inline": true},
                    {"name": "Thời gian", "value": "$(date '+%H:%M:%S %d/%m/%Y') UTC", "inline": true}
                  ],
                  "footer": {"text": "GitHub Actions Monitor"}
                }]
              }
          EOF
              )
              curl -H "Content-Type: application/json" -X POST -d "$JSON_PAYLOAD" $DISCORD_WEBHOOK
            else
              echo "✅ $url Online."
            fi
            agent-browser close || true
            
          done < "${{ matrix.group_file }}"

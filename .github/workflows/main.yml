name: Keep Alive

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5

    steps:
      - name: Install obscura
        run: |
          curl -sLO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-linux.tar.gz
          tar xzf obscura-x86_64-linux.tar.gz
          chmod +x obscura obscura-worker
          sudo mv obscura obscura-worker /usr/local/bin/
          echo "✅ obscura ready"

      - name: Wake Up Services
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          CURRENT_INDEX: ${{ matrix.index }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          RAW_CONFIG_URL: ${{ secrets.RAW_CONFIG_URL }}
          DEBUG: "0"
        run: |
          set -uo pipefail

          # ── Mask secrets ──
          echo "::add-mask::$GH_TOKEN"
          echo "::add-mask::$RAW_CONFIG_URL"
          [ -n "${NTFY_URL:-}" ] && echo "::add-mask::$NTFY_URL"

          # ── Helpers ──
          ntfy_send() {
            [ -n "${NTFY_URL:-}" ] && curl -sf -H "Title: $1" -H "Priority: ${2:-default}" -H "Content-Type: text/plain; charset=utf-8" -d "$3" "$NTFY_URL" >/dev/null 2>&1
          }

          # ── Load config (no-cache) ──
          RAW=$(curl -sf -H "Authorization: token $GH_TOKEN" -H "Cache-Control: no-cache" "${RAW_CONFIG_URL}?_=$(date +%s)") || {
            echo "❌ Failed to load config"
            ntfy_send "❌ Config Load Failed" "high" "Worker $CURRENT_INDEX: Cannot fetch config"
            exit 1
          }

          readarray -t URLS <<< "$(echo "$RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')"
          TOTAL=${#URLS[@]}
          echo "📋 Targets: $TOTAL | Worker: $CURRENT_INDEX/5"
          echo ""

          # ── Failure log (temp file for background jobs) ──
          FAIL_LOG=$(mktemp)
          echo "" > "$FAIL_LOG"

          # ── Check single URL via curl ──
          check_url() {
            local line="$1"
            local url=$(echo "$line" | cut -d'|' -f1 | xargs)
            local num_pipes=$(grep -o "|" <<< "$line" | wc -l)

            echo "::add-mask::$url"

            # Debug: show raw line
            if [ "${DEBUG:-0}" = "1" ]; then
              echo "  🔍 Raw: $line"
              echo "  🔍 Pipes: $num_pipes"
            fi

            # Build curl args
            local curl_args=(-s --max-time 30 -L)
            local header_info=""
            if [ "$num_pipes" -gt 0 ]; then
              for (( j=2; j<=num_pipes+1; j++ )); do
                local h=$(echo "$line" | cut -d'|' -f$j | xargs)
                if [ -n "$h" ]; then
                  curl_args+=(-H "$h")
                  header_info="$h"
                fi
              done
            fi

            # Debug: show header
            if [ "${DEBUG:-0}" = "1" ]; then
              echo "  🔍 Header: [${header_info:-NONE}]"
              echo "  🔍 Curl args: ${curl_args[*]}"
            fi

            # Execute
            local body_file=$(mktemp)
            local start_ms=$(date +%s%N)
            local http_code=$(curl "${curl_args[@]}" -o "$body_file" -w "%{http_code}" "$url" 2>/dev/null || echo "000")
            local end_ms=$(date +%s%N)
            local elapsed_ms=$(( (end_ms - start_ms) / 1000000 ))

            # Extract title + debug body
            local title=$(sed -n 's/.*<title>\([^<]*\)<.*/\1/p' "$body_file" 2>/dev/null | head -1 | xargs)
            [ -z "$title" ] && title="(no title)"
            if [ "${DEBUG:-0}" = "1" ]; then
              echo "  🔍 Body: $(head -c 300 "$body_file" 2>/dev/null | tr '\n' ' ')"
            fi
            rm -f "$body_file"

            if [[ "$http_code" =~ ^5 ]]; then
              echo "  ❌ [$http_code] $title (${elapsed_ms}ms)"
              # Log failure details (5xx only)
              {
                echo "❌ [$http_code] $title (${elapsed_ms}ms)"
                echo "   URL: $url"
                [ -n "$header_info" ] && echo "   Header: $header_info"
                echo ""
              } >> "$FAIL_LOG"
              return 1
            else
              echo "  ✅ [$http_code] $title (${elapsed_ms}ms)"
              return 0
            fi
          }

          # ── Parallel processing ──
          OK=0
          FAIL=0
          PIDS=()

          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            check_url "${URLS[$i]}" &
            PIDS+=($!)
          done

          for pid in "${PIDS[@]}"; do
            if wait $pid; then
              OK=$((OK + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done

          # ── Summary ──
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Worker $CURRENT_INDEX │ ✅ $OK │ ❌ $FAIL │ Total: ${#PIDS[@]}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── Notify (always, info only) ──
          if [ $FAIL -gt 0 ]; then
            FAIL_DETAILS=$(cat "$FAIL_LOG")
            MSG="Worker $CURRENT_INDEX: $FAIL/${#PIDS[@]} DOWN at $(date '+%H:%M %d/%m/%Y')"$'\n\n'"$FAIL_DETAILS"
            ntfy_send "📡 Keep Alive: $FAIL/${#PIDS[@]} down" "low" "$MSG"
          fi

          rm -f "$FAIL_LOG"
          echo "✅ Done"

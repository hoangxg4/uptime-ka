name: Keep Alive

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        index: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    
    steps:
      - name: Install agent-browser
        run: |
          npm install -g agent-browser --silent 2>/dev/null
          timeout 60 agent-browser install --with-deps || {
            echo "⚠️ Install with-deps timeout, retrying without..."
            timeout 30 agent-browser install
          }

      - name: Fast Wake Up
        env:
          DISCORD_WEBHOOK: "${{ secrets.DISCORD_WEBHOOK_URL }}"
          CURRENT_INDEX: ${{ matrix.index }}
          GH_TOKEN: "${{ secrets.GH_PAT }}"
          RAW_CONFIG_URL: "${{ secrets.RAW_CONFIG_URL }}"
        run: |
          # Ẩn token và URL cấu hình khỏi log
          echo "::add-mask::${GH_TOKEN}"
          echo "::add-mask::${RAW_CONFIG_URL}"
          echo "::add-mask::${DISCORD_WEBHOOK}"

          # 1. Tải danh sách cấu hình bảo mật
          RAW_LIST=$(curl -s -H "Authorization: token $GH_TOKEN" "$RAW_CONFIG_URL")
          
          if [ -z "$RAW_LIST" ] || [[ "$RAW_LIST" == *"Not Found"* || "$RAW_LIST" == *"Bad credentials"* ]]; then
            echo "❌ Không thể tải file cấu hình từ Secret!"
            exit 1
          fi

          # 2. Xử lý khoảng trắng và dòng trống
          CLEAN_LIST=$(echo "$RAW_LIST" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
          readarray -t ALL_URLS <<< "$CLEAN_LIST"
          TOTAL=${#ALL_URLS[@]}
          
          echo "📋 Tổng số mục cần ping: $TOTAL (job index: $CURRENT_INDEX)"
          
          # 3. Vòng lặp chia tải Matrix 5
          for (( i=$CURRENT_INDEX; i<$TOTAL; i+=5 )); do
            line="${ALL_URLS[$i]}"
            
            # Tách lấy URL và ẩn khỏi log
            url=$(echo "$line" | cut -d'|' -f1 | sed 's/[[:space:]]*$//')
            echo "::add-mask::${url}"
            echo "🚀 Đang đánh thức: $url"
            
            # Gom các header đi kèm sau dấu "|" thành JSON
            HEADER_JSON=""
            num_pipes=$(grep -o "|" <<< "$line" | wc -l)
            
            if [ "$num_pipes" -gt 0 ]; then
              JSON_PAIRS=""
              for (( j=2; j<=num_pipes+1; j++ )); do
                single_header=$(echo "$line" | cut -d'|' -f$j | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                if [ -n "$single_header" ]; then
                  h_key=$(echo "$single_header" | cut -d':' -f1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                  h_val=$(echo "$single_header" | cut -d':' -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                  if [ -n "$JSON_PAIRS" ]; then JSON_PAIRS="$JSON_PAIRS,"; fi
                  JSON_PAIRS="$JSON_PAIRS\"$h_key\":\"$h_val\""
                fi
              done
              if [ -n "$JSON_PAIRS" ]; then
                HEADER_JSON="--headers '{${JSON_PAIRS}}'"
              fi
            fi
            
            # 4. Gọi trình duyệt mở Web (timeout 30s防止 kẹt)
            RESULT=$(timeout 30 bash -c "eval \"agent-browser open \\\"$url\\\" $HEADER_JSON --timeout 25000 2>&1\"") || true
            
            # 5. Bộ lọc lỗi tối giản dành riêng cho Keep Alive (Chấp nhận cả mã lỗi 404)
            if [[ "$RESULT" == *"ERR_HTTP_RESPONSE_CODE_FAILURE"* ]]; then
              echo "✅ Phản hồi mã lỗi chủ đích (Ví dụ: 404/401/403). Server vẫn SỐNG!"
            elif [[ "$RESULT" == *"ERR_"* || "$RESULT" == *"Timeout"* || "$RESULT" == *"status: 5"* ]]; then
              echo "❌ THỰC SỰ SẬP! Chi tiết: $RESULT"
              
              SHORT_ERR=$(echo "$RESULT" | head -n 2 | cut -c1-100)
              
              MSG="{\"embeds\":[{\"title\":\"🚨 CẢNH BÁO: WEB SẬP HOÀN TOÀN\",\"color\":15158528,\"description\":\"**Lỗi:** $SHORT_ERR\",\"footer\":{\"text\":\"$(date '+%H:%M:%S %d/%m/%Y')\"}}]}"
              curl -s -H "Content-Type: application/json" -X POST -d "$MSG" "$DISCORD_WEBHOOK"
            else
              echo "✅ Đã được đánh thức thành công (Hoặc đang Online)."
            fi
            
            agent-browser close || true
          done
